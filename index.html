<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1006">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gul Tailors">
<title>Gul Tailors</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1006;--gold:#c9952a;--gold2:#e8b84b;--cream:#fdf6e9;--cream2:#f5e8cc;
  --green:#1e6b45;--red:#b03030;--blue:#1e4f8c;--card:#fffdf7;--border:#e2cfa0;
  --shadow:0 2px 12px rgba(100,70,10,.10);--radius:12px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Amiri',serif}

/* App Shell */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--ink);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.topbar h1{color:var(--gold2);font-size:1.15rem;flex:1}
.topbar .back-btn{color:var(--gold2);background:none;border:none;font-size:1.3rem;cursor:pointer;padding:4px 8px}
.content{flex:1;padding:16px;padding-bottom:80px}

/* Bottom Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--ink);display:flex;border-top:1px solid rgba(255,255,255,.08);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.5);font-size:.6rem;font-family:inherit;gap:2px;transition:color .15s}
.nav-btn .ni{font-size:1.3rem}
.nav-btn.active{color:var(--gold2)}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.card-title{font-size:.95rem;font-weight:700;color:var(--ink);margin-bottom:12px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px;box-shadow:var(--shadow)}
.stat-card .slabel{font-size:.65rem;color:#9a7c44;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.stat-card .svalue{font-family:'Amiri',serif;font-size:1.4rem;color:var(--ink);margin-top:2px}
.stat-card .ssub{font-size:.65rem;color:#9a7c44;margin-top:1px}
.stat-card.green .svalue{color:var(--green)}
.stat-card.red .svalue{color:var(--red)}
.stat-card.gold .svalue{color:var(--gold)}
.stat-card.blue .svalue{color:var(--blue)}

/* List Items */
.list-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:flex-start}
.list-item .li-main{flex:1}
.list-item .li-name{font-weight:700;font-size:.92rem;color:var(--ink)}
.list-item .li-sub{font-size:.74rem;color:#7a5c20;margin-top:2px}
.list-item .li-bal{text-align:right;font-size:.8rem;font-weight:700}
.li-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

/* Forms */
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.74rem;font-weight:600;color:#6b4f20;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;
  font-size:.9rem;background:#fffdf7;color:var(--ink);outline:none;font-family:inherit
}
.form-group input:focus,.form-group select:focus{border-color:var(--gold)}
.form-group textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:8px;font-size:.84rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;font-family:inherit;width:100%}
.btn-gold{background:var(--gold);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--border)}
.btn-sm{padding:7px 12px;font-size:.76rem;width:auto}
.btn-xs{padding:4px 10px;font-size:.7rem;width:auto;border-radius:6px}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn-row .btn{flex:1}

/* Modal / Drawer */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end}
.drawer{background:var(--card);border-radius:18px 18px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.drawer-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.drawer-title{font-size:1.1rem;font-weight:700;font-family:'Amiri',serif;margin-bottom:16px}

/* Badges */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.68rem;font-weight:700}
.badge.green{background:#e6f4ed;color:var(--green)}
.badge.red{background:#fbeaea;color:var(--red)}
.badge.gold{background:#fdf2d8;color:#9a6a00}
.badge.blue{background:#e8f0fb;color:var(--blue)}

/* Naap */
.naap-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.naap-item{background:var(--cream2);border-radius:8px;padding:8px;text-align:center}
.naap-item .nl{font-size:.62rem;color:#7a5c20;font-weight:600;text-transform:uppercase}
.naap-item .nv{font-size:1rem;font-weight:700;color:var(--ink)}

/* Ledger */
.ledger-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.ledger-row:last-child{border-bottom:none}
.debit{color:var(--red);font-weight:600}
.credit{color:var(--green);font-weight:600}
.bal-pos{color:var(--green);font-weight:700}
.bal-neg{color:var(--red);font-weight:700}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:#c4a060}
.empty .eicon{font-size:2.5rem;margin-bottom:8px}

/* Search */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px 10px 36px;font-size:.85rem;background:var(--card);font-family:inherit}
.search-wrap .sicon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.9rem}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--cream2);border-radius:10px;padding:4px;margin-bottom:16px}
.tab{flex:1;text-align:center;padding:7px;border-radius:7px;cursor:pointer;font-size:.75rem;font-weight:600;color:#7a5c20;border:none;background:none;font-family:inherit}
.tab.active{background:var(--card);color:var(--gold);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* FAB */
.fab{position:fixed;bottom:70px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--gold);color:#fff;font-size:1.5rem;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(201,149,42,.4);display:flex;align-items:center;justify-content:center;z-index:99}

/* Alert */
.alert{background:#fffbef;border:1px solid var(--gold);border-radius:10px;padding:12px;margin-bottom:12px;font-size:.82rem;color:#7a5000}

/* Section Header */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.section-header h3{font-size:1rem;font-weight:700}

/* Report row */
.rpt-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:.82rem}
.rpt-row:last-child{border-bottom:none}
.rpt-row .rr-name{color:var(--ink);font-weight:500}
.rpt-row .rr-val{font-weight:700}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="back-btn" id="backBtn" onclick="goBack()" style="display:none">←</button>
    <h1 id="pageTitle">✂️ Gul Tailors</h1>
  </div>
  <div class="content" id="mainContent"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nb-dash" onclick="showPage('dashboard')"><span class="ni">🏠</span>Home</button>
    <button class="nav-btn" id="nb-clients" onclick="showPage('clients')"><span class="ni">👔</span>Clients</button>
    <button class="nav-btn" id="nb-workers" onclick="showPage('workers')"><span class="ni">👷</span>Workers</button>
    <button class="nav-btn" id="nb-ws" onclick="showPage('wholesalers')"><span class="ni">🏪</span>WS</button>
    <button class="nav-btn" id="nb-more" onclick="showPage('more')"><span class="ni">⋯</span>Aur</button>
  </nav>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay" style="display:none" onclick="closeDrawer(event)">
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div id="drawerContent"></div>
  </div>
</div>

<script>
// ── Storage Helpers ──────────────────────────────────────────────────────
const db = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const today = () => new Date().toISOString().split('T')[0];
const fmtNum = n => parseFloat(n||0).toLocaleString('en-PK');
const fmtDate = d => { try { return new Date(d).toLocaleDateString('en-PK',{day:'2-digit',month:'short',year:'numeric'}); } catch { return d; } };
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── State ─────────────────────────────────────────────────────────────────
let currentPage = 'dashboard';
let pageStack = [];
let drawerCallback = null;

// ── Navigation ────────────────────────────────────────────────────────────
function showPage(page, pushStack = false) {
  if (pushStack) pageStack.push(currentPage);
  currentPage = page;
  const titles = {
    dashboard:'✂️ Gul Tailors', clients:'👔 Clients', workers:'👷 Workers',
    wholesalers:'🏪 Wholesalers', inventory:'📦 Inventory',
    expenses:'💸 Expenses', reports:'📊 Reports', more:'⋯ Aur'
  };
  document.getElementById('pageTitle').textContent = titles[page] || page;
  document.getElementById('backBtn').style.display = pageStack.length > 0 ? 'block' : 'none';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const map = { dashboard:'nb-dash', clients:'nb-clients', workers:'nb-workers', wholesalers:'nb-ws' };
  if (map[page]) document.getElementById(map[page]).classList.add('active');
  if (page === 'more') document.getElementById('nb-more').classList.add('active');
  render();
}

function goBack() {
  if (pageStack.length > 0) { currentPage = pageStack.pop(); showPage(currentPage); }
}

// ── Drawer ────────────────────────────────────────────────────────────────
function openDrawer(html, cb) {
  document.getElementById('drawerContent').innerHTML = html;
  document.getElementById('overlay').style.display = 'flex';
  drawerCallback = cb || null;
}
function closeDrawer(e) {
  if (!e || e.target === document.getElementById('overlay')) {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('drawerContent').innerHTML = '';
  }
}
function closeDrawerForce() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('drawerContent').innerHTML = '';
}

// ── Balance Helpers ───────────────────────────────────────────────────────
function clientBalance(cid) {
  return db.get('gt_ctxns').filter(t=>t.cid===cid)
    .reduce((s,t)=>t.type==='credit'?s+ +t.amount:s- +t.amount, 0);
}
function workerBalance(wid) {
  return db.get('gt_wentries').filter(e=>e.wid===wid)
    .reduce((s,e)=>{
      if(e.type==='work') return s+(+(e.suits||0))*(+(e.rate||0));
      return s - +(e.amount||0);
    }, 0);
}
function wsBalance(wsid) {
  return db.get('gt_wstxns').filter(t=>t.wsid===wsid)
    .reduce((s,t)=>t.type==='purchase'?s+ +t.amount:s- +t.amount, 0);
}

// ── NAAP FIELDS ───────────────────────────────────────────────────────────
const NAAP = [
  ['kandha','Kandha'],['baazu','Baazu'],['seena','Seena'],['kamar','Kamar'],
  ['ghera','Ghera'],['lambai','Lambai'],['gardan','Gardan'],['paincha','Paincha'],
  ['shalwar','Shalwar'],['kuff','Kuff'],['patti','Patti'],['tehraa','Tehraa']
];

// ═══════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════
function renderDashboard() {
  const clients = db.get('gt_clients');
  const ctxns = db.get('gt_ctxns');
  const workers = db.get('gt_workers');
  const wentries = db.get('gt_wentries');
  const wss = db.get('gt_wholesalers');
  const wstxns = db.get('gt_wstxns');
  const expenses = db.get('gt_expenses');
  const mon = new Date().toISOString().slice(0,7);

  const todayInc = ctxns.filter(t=>t.type==='credit'&&t.date===today()).reduce((s,t)=>s+ +t.amount,0);
  const todayExp = expenses.filter(e=>e.date===today()).reduce((s,e)=>s+ +e.amount,0);
  const monInc = ctxns.filter(t=>t.type==='credit'&&(t.date||'').startsWith(mon)).reduce((s,t)=>s+ +t.amount,0);
  const monExp = expenses.filter(e=>(e.date||'').startsWith(mon)).reduce((s,e)=>s+ +e.amount,0);
  const cBaaki = clients.reduce((s,c)=>{const b=clientBalance(c.id);return b<0?s+Math.abs(b):s;},0);
  const wsBaaki = wss.reduce((s,w)=>{const b=wsBalance(w.id);return b>0?s+b:s;},0);
  const wrkBaaki = workers.reduce((s,w)=>{const b=workerBalance(w.id);return b>0?s+b:s;},0);
  const net = monInc - monExp;

  return `
  <div class="stats-grid">
    <div class="stat-card green"><div class="slabel">Aaj Aaya</div><div class="svalue">Rs.${fmtNum(todayInc)}</div><div class="ssub">Client payments</div></div>
    <div class="stat-card red"><div class="slabel">Aaj Kharcha</div><div class="svalue">Rs.${fmtNum(todayExp)}</div></div>
    <div class="stat-card gold"><div class="slabel">Mahana Aaya</div><div class="svalue">Rs.${fmtNum(monInc)}</div></div>
    <div class="stat-card red"><div class="slabel">Mahana Kharcha</div><div class="svalue">Rs.${fmtNum(monExp)}</div></div>
    <div class="stat-card gold"><div class="slabel">Client Baaki (Lena)</div><div class="svalue">Rs.${fmtNum(cBaaki)}</div></div>
    <div class="stat-card red"><div class="slabel">WS Baaki (Dena)</div><div class="svalue">Rs.${fmtNum(wsBaaki)}</div></div>
    <div class="stat-card blue"><div class="slabel">Worker Baaki</div><div class="svalue">Rs.${fmtNum(wrkBaaki)}</div></div>
    <div class="stat-card ${net>=0?'green':'red'}"><div class="slabel">Net Fayda</div><div class="svalue">Rs.${fmtNum(Math.abs(net))}</div><div class="ssub">${net>=0?'Fayda':'Nuqsan'}</div></div>
  </div>
  <div class="card">
    <div class="card-title">📋 Quick Info</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:.85rem">
      <span>👔 Clients: <strong>${clients.length}</strong></span>
      <span>👷 Workers: <strong>${workers.length}</strong></span>
      <span>🏪 WS: <strong>${wss.length}</strong></span>
    </div>
  </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════════
// CLIENTS
// ═══════════════════════════════════════════════════════════════════════════
function renderClients() {
  const clients = db.get('gt_clients');
  const search = document.getElementById('csearch')?.value?.toLowerCase() || '';
  const filtered = clients.filter(c =>
    c.name.toLowerCase().includes(search) || (c.phone||'').includes(search)
  );
  let html = `
  <div class="search-wrap">
    <span class="sicon">🔍</span>
    <input id="csearch" placeholder="Naam ya mobile se dhundhen..." oninput="render()" value="${esc(search)}">
  </div>`;

  if (filtered.length === 0) {
    html += `<div class="empty"><div class="eicon">👔</div>Koi client nahi</div>`;
  } else {
    filtered.forEach(c => {
      const bal = clientBalance(c.id);
      const balTxt = bal < 0 ? `<span class="bal-neg">Rs.${fmtNum(Math.abs(bal))} Baaki</span>` :
                     bal > 0 ? `<span class="bal-pos">Rs.${fmtNum(bal)} Jama</span>` :
                     `<span class="badge green">Clear</span>`;
      html += `
      <div class="list-item" style="flex-direction:column">
        <div style="display:flex;justify-content:space-between;width:100%">
          <div class="li-main">
            <div class="li-name">${esc(c.name)}</div>
            <div class="li-sub">${c.phone?'📞 '+esc(c.phone):''} ${c.address?'• '+esc(c.address):''}</div>
          </div>
          <div class="li-bal">${balTxt}</div>
        </div>
        <div class="li-actions">
          <button class="btn btn-xs btn-gold" onclick="openClientTxn('${c.id}')">+ Transaction</button>
          <button class="btn btn-xs btn-ghost" onclick="openClientNaap('${c.id}')">📏 Naap</button>
          <button class="btn btn-xs btn-ghost" onclick="openClientLedger('${c.id}')">📒 Ledger</button>
          <button class="btn btn-xs btn-ghost" onclick="editClient('${c.id}')">✏️</button>
          <button class="btn btn-xs btn-red" onclick="delClient('${c.id}')">🗑</button>
        </div>
      </div>`;
    });
  }
  return html;
}

function openAddClient() {
  openDrawer(`
    <div class="drawer-title">👔 Naya Client</div>
    <div class="form-group"><label>Naam *</label><input id="f_name" placeholder="Client ka naam"></div>
    <div class="form-group"><label>Mobile</label><input id="f_phone" type="tel" placeholder="03xx-xxxxxxx"></div>
    <div class="form-group"><label>Pata</label><input id="f_address" placeholder="Gali, mohalla..."></div>
    <div class="form-group"><label>Notes</label><textarea id="f_notes" placeholder="Koi khaas baat..."></textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeDrawerForce()">Cancel</button>
      <button class="btn btn-gold" onclick="saveClient()">✅ Save</button>
    </div>
  `);
}

function saveClient(id) {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { alert('Naam zaroor likhein!'); return; }
  const clients = db.get('gt_clients');
  const obj = { name, phone: document.getElementById('f_phone').value, address: document.getElementById('f_address').value, notes: document.getElementById('f_notes').value };
  if (id) { db.set('gt_clients', clients.map(c => c.id===id ? {...c,...obj} : c)); }
  else { obj.id = uid(); obj.naap = {}; obj.createdAt = today(); db.set('gt_clients', [...clients, obj]); }
  closeDrawerForce(); render();
}

function editClient(id) {
  const c = db.get('gt_clients').find(x=>x.id===id);
  if (!c) return;
  openDrawer(`
    <div class="drawer-title">✏️ Client Edit</div>
    <div class="form-group"><label>Naam *</label><input id="f_name" value="${esc(c.name)}"></div>
    <div class="form-group"><label>Mobile</label><input id="f_phone" type="tel" value="${esc(c.phone||'')}"></div>
    <div class="form-group"><label>Pata</label><input id="f_address" value="${esc(c.address||'')}"></div>
    <div class="form-group"><label>Notes</label><textarea id="f_notes">${esc(c.notes||'')}</textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeDrawerForce()">Cancel</button>
      <button class="btn btn-gold" onclick="saveClient('${id}')">✅ Save</button>
    </div>
  `);
}

function delClient(id) {
  const c = db.get('gt_clients').find(x=>x.id===id);
  if (!confirm(`"${c?.name}" aur uska saara data delete hoga. Sure hain?`)) return;
  db.set('gt_clients', db.get('gt_clients').filter(x=>x.id!==id));
  db.set('gt_ctxns', db.get('gt_ctxns').filter(t=>t.cid!==id));
  render();
}

function openClientNaap(id) {
  const c = db.get('gt_clients').find(x=>x.id===id);
  const n = c.naap || {};
  const fields = NAAP.map(([k,l])=>`
    <div class="form-group">
      <label>${l}</label>
      <input id="naap_${k}" type="number" step="0.5" value="${n[k]||''}" placeholder="inches">
    </div>`).join('');
  openDrawer(`
    <div class="drawer-title">📏 ${esc(c.name)} — Naap</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${fields}</div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-ghost" onclick="closeDrawerForce()">Cancel</button>
      <button class="btn btn-gold" onclick="saveNaap('${id}')">✅ Save</button>
    </div>
  `);
}

function saveNaap(id) {
  const naap = {};
  NAAP.forEach(([k])=>{ const v=document.getElementById('naap_'+k).value; if(v) naap[k]=v; });
  db.set('gt_clients', db.get('gt_clients').map(c=>c.id===id?{...c,naap}:c));
  closeDrawerForce();
}

function openClientLedger(id) {
  const c = db.get('gt_clients').find(x=>x.id===id);
  const txns = db.get('gt_ctxns').filter(t=>t.cid===id).sort((a,b)=>a.date>b.date?-1:1);
  const bal = clientBalance(id);
  const naap = c.naap || {};
  const naapHtml = Object.keys(naap).length > 0 ? `

function saveWorkerEntry(wid) {

  if (type==='work') { entry.suits=document.getElementById('f_suits').value; entry.rate=document.getElementById('f_rate').value; }
  else entry.amount = document.getElementById('f_amount').value;
  if (type==='work' && !entry.suits) { alert('Suits likhein!'); return; }
  if (type!=='work' && !entry.amount) { alert('Raqam likhein!'); return; }

  closeDrawerForce(); render();

  const w = db.get('gt_workers').find(x=>x.id===id);

  const bal = workerBalance(id);
  const rows = entries.length===0 ? '<div class="empty" style="padding:20px">Koi entry nahi</div>' :
    entries.map(e=>{
      const amt = e.type==='work'?(+e.suits||0)*(+e.rate||0):+(e.amount||0);
      return `<div class="ledger-row">
        <div>
          <div style="font-weight:600">${e.type==='work'?`${e.suits} suits × Rs.${e.rate}`:esc(e.desc||e.type)}</div>
          <div style="font-size:.7rem;color:#9a7c44">${fmtDate(e.date)} • <span class="badge ${e.type==='work'?'blue':e.type==='payment'?'green':'gold'}">${e.type==='work'?'Kaam':e.type==='payment'?'Payment':'Advance'}</span></div>
        </div>
        <div class="${e.type==='work'?'credit':'debit'}">Rs.${fmtNum(amt)}</div>

    <div style="text-align:right;margin-bottom:12px"><span class="${bal>0?'bal-pos':''}">Baaki: Rs.${fmtNum(bal)}</span></div>

function renderInventory() {
  const items = db.get('gt_inventory');

  let html = '';
  if (low.length>0) html+=`<div class="alert">⚠️ Kam Stock: ${low.map(i=>i.name).join(', ')}</div>`;
  if (items.length===0) html+=`<div class="empty"><div class="eicon">📦</div>Koi item nahi</div>`;
  items.forEach(it=>{
    const isLow = +it.qty<=(+(it.minStock||0))&&it.qty!=='';
    html+=`
    <div class="list-item" style="flex-direction:column">
      <div style="display:flex;justify-content:space-between;width:100%">
        <div class="li-main">
          <div class="li-name">${esc(it.name)} <span class="badge blue">${esc(it.category)}</span></div>
          <div class="li-sub ${isLow?'bal-neg':''}">${it.qty} ${it.unit} ${it.cost?'• Rs.'+fmtNum(it.cost):''}</div>
        </div>
        ${isLow?'<span class="badge red">Kam!</span>':''}
      </div>
      <div class="li-actions">
        <button class="btn btn-xs btn-ghost" onclick="editInventory('${it.id}')">✏️ Edit</button>
        <button class="btn btn-xs btn-red" onclick="delInventory('${it.id}')">🗑</button>
      </div>
    </div>`;
  });
  return html;
}

    </div>
    <div class="form-row">
      <div class="form-group"><label>Cost</label><input id="f_cost" type="number" value="${it.cost||''}"></div>
      <div class="form-group"><label>Min Stock</label><input id="f_min" type="number" value="${it.minStock||''}"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeDrawerForce()">Cancel</button>
      <button class="btn btn-gold" onclick="saveInventory('${id}')">✅ Save</button>
    </div>
  `);
}

function delInventory(id) {
  if (!confirm('Yeh item delete hoga?')) return;
  db.set('gt_inventory', db.get('gt_inventory').filter(i=>i.id!==id)); render();
}

// ═══════════════════════════════════════════════════════════════════════════
// EXPENSES
// ═══════════════════════════════════════════════════════════════════════════
function renderExpenses() {
  const exps = db.get('gt_expenses').sort((a,b)=>a.date>b.date?-1:1);
  const mon = new Date().toISOString().slice(0,7);
  const todayTotal = exps.filter(e=>e.date===today()).reduce((s,e)=>s+ +e.amount,0);
  const monTotal = exps.filter(e=>(e.date||'').startsWith(mon)).reduce((s,e)=>s+ +e.amount,0);
  let html = `
  <div class="stats-grid" style="grid-template-columns:1fr 1fr 1fr;gap:8px">
    <div class="stat-card red"><div class="slabel">Aaj</div><div class="svalue" style="font-size:1.1rem">Rs.${fmtNum(todayTotal)}</div></div>
    <div class="stat-card red"><div class="slabel">Mahina</div><div class="svalue" style="font-size:1.1rem">Rs.${fmtNum(monTotal)}</div></div>
    <div class="stat-card red"><div class="slabel">Kul</div><div class="svalue" style="font-size:1.1rem">Rs.${fmtNum(exps.reduce((s,e)=>s+ +e.amount,0))}</div></div>
  </div>`;
  if (exps.length===0) html+=`<div class="empty"><div class="eicon">💸</div>Koi kharcha nahi</div>`;
  exps.forEach(e=>{
    html+=`
    <div class="list-item">
      <div class="li-main">
        <div class="li-name"><span class="badge red">${esc(e.category)}</span> ${esc(e.desc||'')}</div>
        <div class="li-sub">${fmtDate(e.date)}</div>
      </div>
      <div style="text-align:right">
        <div class="debit">Rs.${fmtNum(e.amount)}</div>
        <button class="btn btn-xs btn-red" style="margin-top:4px" onclick="delExpense('${e.id}')">🗑</button>
      </div>
    </div>`;
  });
  return html;
}

function openAddExpense() {
  openDrawer(`
    <div class="drawer-title">💸 Naya Kharcha</div>
    <div class="form-group"><label>Category</label>
      <select id="f_cat">${['bijli','paani','kiraya','machinery','sawai','petrol','khaana','mobile','aur'].map(c=>`<option>${c}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label>Raqam *</label><input id="f_amount" type="number" placeholder="0"></div>
    <div class="form-group"><label>Tarikh</label><input id="f_date" type="date" value="${today()}"></div>
    <div class="form-group"><label>Tafseelaat</label><input id="f_desc" placeholder="Optional..."></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeDrawerForce()">Cancel</button>
      <button class="btn btn-gold" onclick="saveExpense()">✅ Save</button>
    </div>
  `);
}

function saveExpense() {
  const amount = document.getElementById('f_amount').value;
  if (!amount) { alert('Raqam likhein!'); return; }
  const exps = db.get('gt_expenses');
  exps.push({ id:uid(), category:document.getElementById('f_cat').value, amount, date:document.getElementById('f_date').value, desc:document.getElementById('f_desc').value });
  db.set('gt_expenses', exps);
  closeDrawerForce(); render();
}

function delExpense(id) {
  if (!confirm('Delete?')) return;
  db.set('gt_expenses', db.get('gt_expenses').filter(e=>e.id!==id)); render();
}

// ═══════════════════════════════════════════════════════════════════════════
// REPORTS
// ═══════════════════════════════════════════════════════════════════════════
let reportPeriod = 'today';
function renderReports() {
  const clients = db.get('gt_clients');
  const ctxns = db.get('gt_ctxns');
  const workers = db.get('gt_workers');
  const wentries = db.get('gt_wentries');
  const wss = db.get('gt_wholesalers');
  const wstxns = db.get('gt_wstxns');
  const expenses = db.get('gt_expenses');
  const mon = new Date().toISOString().slice(0,7);

  const inRange = d => {
    if (reportPeriod==='today') return d===today();
    if (reportPeriod==='week') { const w=new Date(); w.setDate(w.getDate()-7); return new Date(d)>=w; }
    if (reportPeriod==='month') return (d||'').startsWith(mon);
    return true;
  };

  const income = ctxns.filter(t=>t.type==='credit'&&inRange(t.date)).reduce((s,t)=>s+ +t.amount,0);
  const exp = expenses.filter(e=>inRange(e.date)).reduce((s,e)=>s+ +e.amount,0);
  const cBaaki = clients.reduce((s,c)=>{const b=clientBalance(c.id);return b<0?s+Math.abs(b):s;},0);
  const wsBaaki = wss.reduce((s,w)=>{const b=wsBalance(w.id);return b>0?s+b:s;},0);
  const wrkBaaki = workers.reduce((s,w)=>{const b=workerBalance(w.id);return b>0?s+b:s;},0);
  const lowStock = db.get('gt_inventory').filter(i=>+i.qty<=(+(i.minStock||0))&&i.qty!=='');

  let html = `
  <div class="tabs">
    <button class="tab ${reportPeriod==='today'?'active':''}" onclick="reportPeriod='today';render()">Aaj</button>
    <button class="tab ${reportPeriod==='week'?'active':''}" onclick="reportPeriod='week';render()">Hafte</button>
    <button class="tab ${reportPeriod==='month'?'active':''}" onclick="reportPeriod='month';render()">Mahina</button>
    <button class="tab ${reportPeriod==='all'?'active':''}" onclick="reportPeriod='all';render()">Sab</button>
  </div>
  <div class="stats-grid">
    <div class="stat-card green"><div class="slabel">Income</div><div class="svalue">Rs.${fmtNum(income)}</div></div>
    <div class="stat-card red"><div class="slabel">Kharchay</div><div class="svalue">Rs.${fmtNum(exp)}</div></div>
    <div class="stat-card ${income-exp>=0?'green':'red'}"><div class="slabel">Net</div><div class="svalue">Rs.${fmtNum(Math.abs(income-exp))}</div><div class="ssub">${income-exp>=0?'Fayda':'Nuqsan'}</div></div>
    <div class="stat-card gold"><div class="slabel">Client Baaki</div><div class="svalue">Rs.${fmtNum(cBaaki)}</div></div>
    <div class="stat-card red"><div class="slabel">WS Dena</div><div class="svalue">Rs.${fmtNum(wsBaaki)}</div></div>
    <div class="stat-card blue"><div class="slabel">Worker Dena</div><div class="svalue">Rs.${fmtNum(wrkBaaki)}</div></div>
  </div>`;

  // Clients with balance
  const withBal = clients.filter(c=>clientBalance(c.id)<0);
  if (withBal.length>0) {
    html+=`<div class="card"><div class="card-title">👔 Clients — Baaki List</div>`;
    withBal.forEach(c=>{
      const b = clientBalance(c.id);
      html+=`<div class="rpt-row"><span class="rr-name">${esc(c.name)} ${c.phone?'<small style="color:#9a7c44">'+esc(c.phone)+'</small>':''}</span><span class="rr-val bal-neg">Rs.${fmtNum(Math.abs(b))}</span></div>`;
    });
    html+=`</div>`;
  }

  // WS with balance
  const wsWithBal = wss.filter(w=>wsBalance(w.id)>0);
  if (wsWithBal.length>0) {
    html+=`<div class="card"><div class="card-title">🏪 Wholesalers — Dena Hai</div>`;
    wsWithBal.forEach(w=>{
      html+=`<div class="rpt-row"><span class="rr-name">${esc(w.name)}</span><span class="rr-val bal-neg">Rs.${fmtNum(wsBalance(w.id))}</span></div>`;
    });
    html+=`</div>`;
  }

  if (lowStock.length>0) {
    html+=`<div class="alert">⚠️ <strong>Low Stock:</strong> ${lowStock.map(i=>`${i.name} (${i.qty} ${i.unit})`).join(', ')}</div>`;
  }

  return html;
}

// ═══════════════════════════════════════════════════════════════════════════
// FAB BUTTONS
// ═══════════════════════════════════════════════════════════════════════════
const fabActions = {
  clients: { fn: openAddClient, icon: '+' },
  workers: { fn: openAddWorker, icon: '+' },
  wholesalers: { fn: openAddWs, icon: '+' },
  inventory: { fn: openAddInventory, icon: '+' },
  expenses: { fn: openAddExpense, icon: '+' },
};

// ═══════════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════
function render() {
  const content = document.getElementById('mainContent');
  const renderers = {
    dashboard: renderDashboard,
    clients: renderClients,
    workers: renderWorkers,
    wholesalers: renderWholesalers,
    more: renderMore,
    inventory: renderInventory,
    expenses: renderExpenses,
    reports: renderReports,
  };
  content.innerHTML = renderers[currentPage] ? renderers[currentPage]() : '';

  // FAB
  const existingFab = document.querySelector('.fab');
  if (existingFab) existingFab.remove();
  if (fabActions[currentPage]) {
    const fab = document.createElement('button');
    fab.className = 'fab';
    fab.innerHTML = fabActions[currentPage].icon;
    fab.onclick = fabActions[currentPage].fn;
    document.body.appendChild(fab);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
render();
</script>
